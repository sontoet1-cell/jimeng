<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Jimeng Video Resolver</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --line: #273449;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #2563eb;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% -10%, #1d4ed8 0%, transparent 60%),
        radial-gradient(1000px 500px at 110% 20%, #14532d 0%, transparent 55%),
        var(--bg);
      display: flex;
      justify-content: center;
    }
    .wrap {
      width: min(980px, 92vw);
      padding: 48px 0 64px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.05;
    }
    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 16px;
    }
    .panel {
      background: rgba(17, 24, 39, 0.82);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }
    #download-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }
    #url {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    #url:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }
    #submit-btn {
      border: 0;
      border-radius: 12px;
      padding: 0 22px;
      min-height: 48px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, var(--accent-2), #0ea5e9);
      cursor: pointer;
    }
    #submit-btn:disabled { opacity: 0.65; cursor: wait; }
    #status {
      min-height: 22px;
      margin: 12px 2px 0;
      color: #facc15;
      font-size: 14px;
    }
    .result.hidden { display: none; }
    .result {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 16px;
      align-items: start;
    }
    .thumb {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 14px;
      border: 1px solid #334155;
      overflow: hidden;
      background: #020617;
    }
    #cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .meta-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #0b1220;
      padding: 14px;
    }
    #item-id { margin: 0 0 8px; color: #94a3b8; font-family: Consolas, monospace; font-size: 13px; }
    #title { margin: 0 0 12px; font-size: 18px; line-height: 1.3; }
    #download-best {
      display: inline-block;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(90deg, var(--accent), #16a34a);
      font-weight: 700;
    }
    #quality-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    #quality-list a {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      color: #e2e8f0;
      text-decoration: none;
      background: #1e293b;
      font-size: 13px;
    }
    .hint {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 13px;
    }
    .warn { color: #fca5a5; }
    @media (max-width: 760px) {
      #download-form { grid-template-columns: 1fr; }
      .result { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Tai video Jimeng</h1>
    <p class="subtitle">Dan link chia se Jimeng, he thong se phan tich va tra cac URL tai hop le.</p>

    <section class="panel">
      <form id="download-form">
        <input id="url" name="url" type="text" placeholder="https://jimeng.jianying.com/s/.../?t=..." autocomplete="off" required>
        <button id="submit-btn" type="submit">Phan tich</button>
      </form>
      <p id="status" aria-live="polite"></p>

      <section class="result hidden" id="result">
        <div class="thumb">
          <img id="cover" class="cover" alt="thumbnail">
        </div>
        <div class="meta-box">
          <p id="item-id"></p>
          <h2 id="title"></h2>
          <a id="download-best" href="#" target="_blank" rel="noopener">Tai nguon uu tien</a>
          <div id="quality-list"></div>
        </div>
      </section>
    </section>

    <p class="hint">
      Luu y: Neu URL nguon tu Jimeng da co watermark thi he thong khong the tu xoa watermark.
      <span class="warn">Chi tai dung theo file nguon duoc tra ve.</span>
    </p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
